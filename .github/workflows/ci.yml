# SPDX-License-Identifier: GPL-3.0-or-later
#
# AstropathDNSRelay — Continuous Integration (M0 skeleton, TASKS T-M0-08).
#
# Scope: lean quality gates only — ruff (lint), black (format check),
# mypy (strict), and pytest with a ≥90% coverage gate, all driven by uv
# against the committed uv.lock (`uv sync --frozen`) for reproducible installs.
#
# Owned elsewhere — do not add here:
#   - Postgres testcontainer + `alembic upgrade head`   (M2 / T-TEST-12)
#   - vuln/license scan, SBOM, multi-arch, image verify (see supply-chain.yml, T-M6-06/07)
#
# All third-party actions are pinned by commit SHA (human tag in a trailing
# comment); bump the SHA to take an action update.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: these gates only read the repository. No secrets are used.
permissions:
  contents: read

# Cancel superseded in-flight runs on the same ref to save runner time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Never mutate the committed lockfile in CI: drift must fail, not auto-resolve.
  UV_FROZEN: "1"

jobs:
  quality:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv and Python 3.11
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          # Pin the uv tool for reproducible CI; bump alongside local upgrades.
          version: "0.8.17"
          # Target the declared floor (pyproject requires-python = ">=3.11");
          # this also matches [tool.mypy] python_version = "3.11".
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies (frozen)
        run: uv sync --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Black (format check)
        run: uv run black --check .

      - name: Mypy (strict)
        run: uv run mypy

      # Coverage gate ≥90% (SPEC §15.3, T-TEST-19). Threshold also declared in
      # [tool.coverage.report] fail_under; kept explicit here for a visible gate.
      - name: Pytest (with coverage, ≥90% gate)
        run: uv run pytest --cov=astropath --cov-report=term-missing --cov-fail-under=90

# SPDX-License-Identifier: GPL-3.0-or-later
#
# astropath-dns-relay — supply-chain & image hardening (SPEC §15.3, T-M6-06/T-M6-07).
#
# Complements ci.yml (lint/format/type/test) with the security + packaging gates:
#   - sast         : bandit static analysis of src/ (gates on medium+ findings)
#   - dependencies : trivy filesystem scan — vuln (gates) + license (inventory)
#   - image        : multi-arch build-verification (amd64 + arm64), trivy image
#                    vuln scan (gates), syft SBOM artifact, and the T-M6-07
#                    runtime checks (non-root + working HEALTHCHECK + boot smoke).
#
# No registry push / release job exists — no remote or registry is configured, so
# this is build/verify only. The registry publish (with SLSA provenance + SBOM
# attestation, which must live in an OCI registry) is a commented template at the
# end of the `image` job, enabled once a registry exists.
#
# Every third-party action is pinned by commit SHA with the human tag in a
# trailing comment; bump the SHA to take an action update.

name: Supply Chain

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege at the top; jobs re-declare to stay explicit. Nothing here
# writes to the repository, pushes an image, or consumes a secret.
permissions:
  contents: read

# Cancel superseded in-flight runs on the same ref to save runner time.
concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: true

env:
  # Never mutate the committed lockfile in CI: drift must fail, not auto-resolve.
  UV_FROZEN: "1"
  # The locally-loaded single-arch tag used for image scan + SBOM + smoke.
  IMAGE_REF: astropath-dns-relay:ci

jobs:
  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv and Python 3.12
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: "0.8.17"
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies (frozen)
        run: uv sync --frozen

      # Gate only on actionable findings: medium+ severity AND medium+ confidence.
      # Config (scope, B104 bind-all suppression) lives in [tool.bandit] (pyproject).
      - name: Bandit (SAST)
        run: uv run bandit -c pyproject.toml -r src --severity-level medium --confidence-level medium

  dependencies:
    name: Dependency scan (trivy fs)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Vulnerability gate on the SHIPPED dependency manifests (root uv.lock +
      # frontend/package-lock.json). tests/ is skipped: it never enters the image
      # (.dockerignore) and the Go contract-test client carries its own module
      # deps owned by the TEST track — not part of the shipped supply chain.
      - name: Trivy filesystem vulnerability scan (gates)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          skip-dirs: tests
          exit-code: "1"
          hide-progress: true

      # License inventory (informational, exit 0). The project is GPL-3.0-or-later
      # (SPEC §1.5): copyleft dependencies (GPL/LGPL/MPL) are license-COMPATIBLE.
      # Trivy's "restricted" class encodes proprietary-distribution risk — inverted
      # for a GPL project — so this step surfaces the full license set for review
      # (a genuinely incompatible/proprietary license is caught here) rather than
      # gating on trivy's default classification.
      - name: Trivy license inventory (informational)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: license
          exit-code: "0"
          hide-progress: true

  image:
    name: Image build, scan, SBOM, verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU (arm64 emulation for the multi-arch leg)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Image build metadata
        id: meta
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # amd64 build loaded into the daemon for scanning + smoke. Provenance is off
      # here (attestations require a registry push — see the template at the end of
      # this job); the multi-arch leg below verifies the arm64 build.
      - name: Build image (amd64, load for scan + smoke)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_REF }}
          provenance: false
          build-args: |
            VERSION=0.1.0
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # T-M6-07 acceptance: non-root + working HEALTHCHECK + the container serving
      # /healthz and / (SPA). This boots DB-ONLY — no bootstrap file: serve() takes
      # its keyring/routing from the database (SPEC §16.4), so the smoke proves the
      # bootstrap-file-less DB boot. Only a throwaway KEK is minted (never printed);
      # a high DNS port (ASTROPATH_DNS_PORT=5353) lets uid 10001 bind without
      # NET_BIND_SERVICE.
      #
      # DB-mode boot fail-fasts (astropath.startup.validate_db_startup, T-M6-10):
      # serve() eagerly pings the database AND requires the schema at the Alembic
      # head before it binds readiness — an unreachable or unmigrated DB exits 2 and
      # the HEALTHCHECK never turns healthy. So the smoke stands up a throwaway
      # Postgres on a private bridge network and migrates it to head with the freshly
      # built image itself (alembic.ini + alembic/ are baked in) before booting. The
      # DB user/password/name below are ephemeral, CI-only, non-secret throwaways;
      # nothing here consumes a repository secret. A private network (not host mode)
      # keeps the app's 8080/5353 binds inside the container namespace — the baked
      # HEALTHCHECK probes 127.0.0.1:8080 there — so only the existing 18080->8080
      # probe map touches the runner host.
      - name: Verify runtime — non-root + HEALTHCHECK + boot smoke (T-M6-07)
        run: |
          set -euo pipefail
          IMAGE="$IMAGE_REF"
          # Ephemeral, non-secret CI throwaways (obviously fake by design).
          PGUSER=ci; PGPASS=ci; PGDB=astropath_ci
          NET=astropath-smoke-net; PG=astropath-smoke-pg
          DSN="postgresql+asyncpg://${PGUSER}:${PGPASS}@${PG}:5432/${PGDB}"

          # Best-effort teardown of everything this step creates, even on a failed
          # assertion, so nothing leaks into later steps.
          cleanup() {
            docker rm -f astropath-smoke "$PG" >/dev/null 2>&1 || true
            docker network rm "$NET" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          test "$(docker inspect --format '{{.Config.User}}' "$IMAGE")" = "astropath"
          test "$(docker run --rm --entrypoint id "$IMAGE" -u)" = "10001"
          test "$(docker inspect --format '{{json .Config.Healthcheck}}' "$IMAGE")" != "null"

          # Throwaway Postgres on a private bridge network; the smoke + migration
          # containers reach it by container name via Docker's embedded DNS.
          docker network rm "$NET" >/dev/null 2>&1 || true
          docker network create "$NET" >/dev/null
          docker run -d --name "$PG" --network "$NET" \
            -e POSTGRES_USER="$PGUSER" -e POSTGRES_PASSWORD="$PGPASS" -e POSTGRES_DB="$PGDB" \
            --health-cmd="pg_isready -U $PGUSER -d $PGDB" \
            --health-interval=2s --health-timeout=3s --health-retries=20 \
            postgres:16@sha256:fe03a7605299a34ddf5e4f285dff78c3d7190a576b3c6b46f2fcff69f4bffd54 >/dev/null  # postgres:16
          pgstat=starting
          for _ in $(seq 1 30); do
            pgstat="$(docker inspect --format '{{.State.Health.Status}}' "$PG" 2>/dev/null || echo starting)"
            [ "$pgstat" = "healthy" ] && break
            sleep 2
          done
          echo "postgres health: $pgstat"
          test "$pgstat" = "healthy"

          # Migrate to head with the freshly built image (alembic/env.py reads
          # ASTROPATH_DATABASE_DSN). Retry briefly to absorb the initdb TCP-readiness
          # race right after the healthcheck flips green.
          migrated=
          for _ in $(seq 1 5); do
            if docker run --rm --network "$NET" -e ASTROPATH_DATABASE_DSN="$DSN" \
              --entrypoint python "$IMAGE" -m alembic upgrade head; then migrated=1; break; fi
            sleep 3
          done
          test -n "$migrated"

          # DB-only boot: no bootstrap file. Only a throwaway KEK is minted (it
          # decrypts the DB secrets too); ASTROPATH_DNS_PORT=5353 keeps uid 10001
          # off the privileged port 53 without NET_BIND_SERVICE.
          KEK="$(docker run --rm --entrypoint python "$IMAGE" \
            -c 'from astropath.crypto import generate_key; print(generate_key())' 2>/dev/null)"
          docker run -d --name astropath-smoke --network "$NET" \
            -e ASTROPATH_DATABASE_DSN="$DSN" \
            -e ASTROPATH_CREDENTIAL_KEK="$KEK" \
            -e ASTROPATH_ADMIN_PASSWORD_HASH='ci-smoke-placeholder-not-used-until-login' \
            -e ASTROPATH_SESSION_SECRET='ci-smoke-placeholder-session-secret' \
            -e ASTROPATH_DNS_PORT=5353 \
            -p 18080:8080 "$IMAGE" >/dev/null
          st=starting
          for _ in $(seq 1 30); do
            st="$(docker inspect --format '{{.State.Health.Status}}' astropath-smoke 2>/dev/null || echo starting)"
            [ "$st" = "healthy" ] && break
            [ "$st" = "unhealthy" ] && break
            sleep 2
          done
          echo "docker HEALTHCHECK status: $st"
          docker logs astropath-smoke 2>&1 | tail -12
          test "$st" = "healthy"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18080/healthz)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18080/)" = "200"

      - name: Trivy image vulnerability scan (gates)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_REF }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          hide-progress: true

      - name: Generate SBOM (syft, SPDX-JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE_REF }}
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: astropath-sbom.spdx.json
          upload-artifact: true

      # Prove the image builds for BOTH shipped architectures. No push/load: a
      # multi-arch manifest cannot load into the single-arch daemon, so this is a
      # pure build-verification (SPEC §15.3: multi-arch amd64 + arm64). The
      # frontend stage is $BUILDPLATFORM-pinned (Dockerfile), so only the Python
      # layers fan out per target arch.
      - name: Multi-arch build-verification (amd64 + arm64, no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          outputs: type=cacheonly
          build-args: |
            VERSION=0.1.0
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- REGISTRY PUBLISH TEMPLATE (disabled: no registry/remote exists) --------
      # Enable once nixknight/astropath-dns-relay has a registry. Adds SLSA build
      # provenance + an SBOM attestation, which live in the OCI registry alongside
      # the image and therefore REQUIRE a push target. Needs `packages: write`
      # (GHCR) or registry credentials as repository secrets — never inline values.
      #
      #   - name: Log in to the registry
      #     uses: docker/login-action@<pin-sha>  # v3
      #     with:
      #       registry: docker.io
      #       username: ${{ secrets.REGISTRY_USERNAME }}
      #       password: ${{ secrets.REGISTRY_TOKEN }}
      #   - name: Build and push (multi-arch) with provenance + SBOM attestation
      #     uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      #     with:
      #       context: .
      #       platforms: linux/amd64,linux/arm64
      #       push: true
      #       tags: nixknight/astropath-dns-relay:${{ github.ref_name }}
      #       provenance: mode=max   # SLSA build provenance attestation
      #       sbom: true             # SBOM attestation attached to the pushed image
      #       build-args: |
      #         VERSION=0.1.0
      #         VCS_REF=${{ github.sha }}
      #         BUILD_DATE=${{ steps.meta.outputs.created }}

# astropath-dns-relay -- TSIG Secret for the cert-manager rfc2136 solver.
# Task: T-DEPLOY-03. SPEC 14.4, 14.5.
#
# NAMESPACE: the CLUSTER-RESOURCE namespace (default `cert-manager`). A
# ClusterIssuer resolves tsigSecretSecretRef THERE, never in the Traefik/workload
# namespace (SPEC 14.4). Only the wildcard Certificate + its TLS Secret live in
# the workload namespace.
#
# FORM: `stringData` carrying the PLAINTEXT base64 BIND key string. Kubernetes
# base64-encodes stringData for you. NEVER hand-encode `.data` with an
# already-base64 value: that double-base64s the key -> BADKEY/BADSIG on every
# UPDATE (SPEC 14.5, the net-new trap). This manifest shape matches
# `astropath.bootstrap.render_secret_yaml` byte-for-byte (name / namespace / key
# / stringData), so cert-manager and dnspython key from the identical string.
#
# SOURCE of the value: the base64 BIND secret shown ONCE by
#   astropath-bootstrap gen-tsig
# or re-rendered (from a value you already hold) by
#   astropath-bootstrap secret-yaml --secret <base64 BIND secret>
#
# PREFERRED creation path -- keep the plaintext out of git entirely by creating
# the Secret imperatively (SPEC 14.5):
#   kubectl -n cert-manager create secret generic tsig-secret \
#     --from-literal=tsig-secret-key='<TSIG-SECRET-BASE64>'
#
# This declarative file is for GitOps flows where the value is injected by a
# sealed-secrets / SOPS / ExternalSecrets layer. Commit it ONLY with the
# placeholder below -- never a real secret.
---
apiVersion: v1
kind: Secret
metadata:
  name: tsig-secret
  namespace: cert-manager
  labels:
    app.kubernetes.io/part-of: astropath-dns-relay
type: Opaque
stringData:
  # Single-base64 BIND secret string, verbatim from astropath-bootstrap.
  # Do NOT pre-encode; do NOT move this under `.data`.
  tsig-secret-key: <TSIG-SECRET-BASE64>

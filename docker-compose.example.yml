# AstropathDNSRelay — LOCAL DEVELOPMENT compose (SPEC §15, T-M0-09).
#
# This file is a convenience for running the gateway + a throwaway Postgres on a
# developer machine. It is NOT the deployment artifact: production is an Ansible
# `docker-compose-service` stack (`fw-astropath`) with ansible-vault'd env, an
# externally-managed Postgres, nginx TLS, and firewalling (SPEC §15.4).
#
# Usage:
#   cp .env.example .env.local   # then edit real values into .env.local
#   # point `env_file` below at your copy, or edit .env.example in place
#   docker compose -f docker-compose.example.yml up --build
#
# Validate without running:  docker compose -f docker-compose.example.yml config

name: astropath-dev

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: astropath-dns-relay:dev
    # ASTROPATH_* configuration (SPEC §10). Placeholders only — see .env.example.
    env_file:
      - .env.example
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # RFC2136 DNS listener — BOTH UDP and TCP (TSIG UPDATEs can exceed 512B).
      # Host port 53 may collide with a local resolver (e.g. systemd-resolved);
      # remap the host side (e.g. "5353:53/udp") if so.
      - "53:53/udp"
      - "53:53/tcp"
      # FastAPI management/admin HTTP plane.
      - "8080:8080/tcp"
    # The container runs non-root; binding privileged port 53 needs this cap.
    # (The DNS listener itself lands at M1; harmless before then.)
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    # Local dev credentials — OBVIOUS PLACEHOLDERS. POSTGRES_PASSWORD must match
    # the password in ASTROPATH_DATABASE_DSN (.env.example).
    environment:
      POSTGRES_USER: astropath
      POSTGRES_PASSWORD: CHANGE_ME
      POSTGRES_DB: astropath
    volumes:
      - astropath-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astropath -d astropath"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  astropath-pgdata:
